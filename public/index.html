<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App Render</title>

    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }

        h1{
            color: blue;
        }

        li{
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>Lista de Tareas</h1>

    <ul id="lista"></ul>

    <script>

        async function obtenerTodos() {

            const respuesta = await fetch('/todos');

            const datos = await respuesta.json();

            const lista = document.getElementById('lista');

            datos.forEach(todo => {

                const li = document.createElement('li');

                li.textContent = todo.texto;

                lista.appendChild(li);

            });
        }

        obtenerTodos();

    </script>

</body>
</html>
